<div id="xinnet-browser-overlay" class="xinnet-hidden">
    <div class="phone-hardware">
        <!-- 悬浮窗关闭按钮 -->
        <button id="xinnet-close-btn" class="close-btn" title="关闭浏览器">×</button>

        <div class="phone-screen">
            <div class="notch"><div class="camera-lens"></div></div>

            <div class="status-bar">
                <span class="time">10:42</span>
                <div class="status-right">
                    <span class="signal">5G</span>
                    <div class="battery"><div class="battery-level"></div></div>
                </div>
            </div>

            <div class="home-container" id="home-section">
                <div class="xinnet-logo">
                    <span class="x-part">X</span><span class="net-part">INNET</span>
                </div>

                <div class="search-box">
                    <input type="text" id="browser-input" placeholder="输入搜索内容..." autocomplete="off">
                    <button class="search-btn" id="browser-search-btn">
                        <svg viewBox="0 0 24 24"><path d="M15.5 14h-.79l-.28-.27A6.471 6.471 0 0 0 16 9.5 6.5 6.5 0 1 0 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/></svg>
                    </button>
                </div>
            </div>

            <div class="results-container" id="results-area"></div>
        </div>
    </div>
</div>
